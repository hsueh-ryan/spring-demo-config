# ============================================================
# application.yml - 所有服務的共用配置
# ============================================================
# 這個檔案會被所有連接到 Config Server 的微服務載入，
# 適合放置所有服務共用的設定（如日誌等級、通用參數等）。
#
# 檔案命名規則：
#   application.yml      → 所有服務共用（無論 application name 是什麼）
#   {app-name}.yml       → 特定服務專用
#   {app-name}-{profile}.yml → 特定服務 + 特定環境
# ============================================================

# 共用的日誌設定
logging:
  level:
    root: INFO

# 共用的自訂屬性
app:
  description: "這是由 Config Server git 統一管理的配置"
  version: "1.0.0"
